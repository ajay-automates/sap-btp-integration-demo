_schema-version: '3.1'
ID: sap-btp-integration-demo
version: 1.0.0
description: SAP BTP CAP Integration Demo

modules:

  # ── CAP Application (Node.js) ────────────────────────────
  - name: sap-btp-demo-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: sap-btp-demo-db
      - name: sap-btp-demo-auth
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      disk-quota: 1024M
      memory: 512M

  # ── HANA Deployer ────────────────────────────────────────
  - name: sap-btp-demo-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: sap-btp-demo-db
    parameters:
      buildpack: nodejs_buildpack

resources:

  # ── SAP HANA Cloud ───────────────────────────────────────
  - name: sap-btp-demo-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # ── XSUAA (Auth) ─────────────────────────────────────────
  - name: sap-btp-demo-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npx cds build --production
